<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Dignity Art Edge</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <link rel="stylesheet" href="../assets/css/auth.css">
</head>
<body>

  <div id="dae-navbar"></div>

  <section class="auth-split">
    <div class="auth-image">
      <img src="https://picsum.photos/seed/auth-gallery/900/1100" alt="A curated gallery wall of paintings">
      <div class="auth-image-caption">
        <span class="label-mono">Member Access</span>
        <h3>Your collection, in one place.</h3>
      </div>
    </div>

    <div class="auth-form-side">
      <div class="auth-form-card">
        <div class="section-eyebrow mb-3">Welcome Back</div>
        <h2 class="mb-2">Log In</h2>
        <p class="text-muted mb-4">New here? <a href="register.html" class="text-rust">Create an account</a></p>

        <div id="login-alert" class="alert d-none"></div>

        <form id="login-form" class="form-dae needs-validation" novalidate>
          <div class="mb-3">
            <label for="login-email">Email Address</label>
            <input type="email" class="form-control" id="login-email" required>
            <div class="invalid-feedback">Please enter a valid email.</div>
          </div>
          <div class="mb-3">
            <label for="login-password">Password</label>
            <input type="password" class="form-control" id="login-password" required minlength="6">
            <div class="invalid-feedback">Password must be at least 6 characters.</div>
          </div>
          <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="login-remember">
              <label class="form-check-label small" for="login-remember">Remember me</label>
            </div>
            <a href="#" class="small text-rust">Forgot password?</a>
          </div>
          <button type="submit" class="btn btn-dae btn-dae-primary w-100 py-3">Log In <i class="bi bi-arrow-right"></i></button>
        </form>

        <p class="small text-muted mt-4 mb-0"><i class="bi bi-info-circle me-1"></i>Demo store — register a free account first, since no real users are pre-seeded.</p>
      </div>
    </div>
  </section>

  <div id="dae-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    window.DAE_BASE = "../";
    window.DAE_PAGE = "login";
  </script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/product-card.js"></script>
  <script src="../assets/js/cart.js"></script>
  <script src="../assets/js/wishlist.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/components.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", daeInitLoginForm);
  </script>
</body>
</html>
