<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Dignity Art Edge</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="admin-body">

  <div class="admin-login-wrap">
    <div class="admin-login-card">
      <a href="../index.html" class="brand-mark d-flex">Dignity <span>Art</span> Edge</a>
      <p class="text-center label-mono mb-4">Studio Admin Console</p>

      <div id="admin-login-alert" class="alert d-none"></div>

      <form id="admin-login-form" class="form-dae">
        <div class="mb-3">
          <label for="admin-email">Admin Email</label>
          <input type="email" class="form-control" id="admin-email" required>
        </div>
        <div class="mb-4">
          <label for="admin-password">Password</label>
          <input type="password" class="form-control" id="admin-password" required>
        </div>
        <button type="submit" class="btn btn-dae btn-dae-primary w-100 py-3">Sign In <i class="bi bi-arrow-right"></i></button>
      </form>

      <div class="admin-login-demo mt-4">
        <strong>Demo credentials</strong><br>
        Email: admin@dignityartedge.com<br>
        Password: Admin@123
      </div>

      <p class="text-center small text-muted mt-4 mb-0"><a href="../index.html"><i class="bi bi-arrow-left"></i> Back to storefront</a></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/admin/admin-common.js"></script>
  <script>
    document.getElementById("admin-login-form").addEventListener("submit", (e) => {
      e.preventDefault();
      const email = document.getElementById("admin-email").value.trim();
      const password = document.getElementById("admin-password").value;
      const alertBox = document.getElementById("admin-login-alert");

      if (daeAdminLogin(email, password)) {
        alertBox.className = "alert alert-success";
        alertBox.textContent = "Signed in. Redirecting…";
        alertBox.classList.remove("d-none");
        setTimeout(() => (window.location.href = "dashboard.html"), 500);
      } else {
        alertBox.className = "alert alert-danger";
        alertBox.textContent = "Incorrect admin email or password.";
        alertBox.classList.remove("d-none");
      }
    });
  </script>
</body>
</html>
