<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders — Dignity Art Edge</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <link rel="stylesheet" href="../assets/css/account.css">
</head>
<body>

  <div id="dae-navbar"></div>

  <section class="page-banner">
    <div class="container">
      <div class="breadcrumb-mono mb-2"><a href="../index.html">Home</a> / <span class="text-white">My Orders</span></div>
      <h1>My Orders</h1>
    </div>
  </section>

  <section class="container py-5">
    <div class="row g-4">
      <div class="col-lg-3">
        <div class="surface p-3 account-sidebar">
          <div class="d-flex align-items-center gap-3 px-2 py-3 border-bottom mb-2">
            <div class="account-avatar"><i class="bi bi-person"></i></div>
            <div>
              <strong id="acc-side-name">—</strong>
              <span class="d-block label-mono" id="acc-side-email">—</span>
            </div>
          </div>
          <a href="profile.html" class="account-link"><i class="bi bi-person"></i> My Profile</a>
          <a href="orders.html" class="account-link active"><i class="bi bi-box-seam"></i> My Orders</a>
          <a href="wishlist.html" class="account-link"><i class="bi bi-heart"></i> Wishlist</a>
          <a href="cart.html" class="account-link"><i class="bi bi-bag"></i> My Cart</a>
          <a href="#" class="account-link text-danger" id="orders-logout-btn"><i class="bi bi-box-arrow-right"></i> Logout</a>
        </div>
      </div>

      <div class="col-lg-9">
        <div class="d-flex flex-column gap-3" id="orders-list"><!-- injected by orders.js --></div>

        <div class="empty-state d-none" id="orders-empty-state">
          <i class="bi bi-box-seam"></i>
          <h4 class="mt-3">No orders yet</h4>
          <p class="text-muted">Once you place an order it will show up here with full tracking status.</p>
          <a href="shop.html" class="btn btn-dae btn-dae-primary mt-2">Browse the Shop</a>
        </div>
      </div>
    </div>
  </section>

  <div id="dae-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    window.DAE_BASE = "../";
    window.DAE_PAGE = "orders";
  </script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/product-card.js"></script>
  <script src="../assets/js/cart.js"></script>
  <script src="../assets/js/wishlist.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/components.js"></script>
  <script src="../assets/js/main.js"></script>
  <script src="../assets/js/orders.js"></script>
</body>
</html>
