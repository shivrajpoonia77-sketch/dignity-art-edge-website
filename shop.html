<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop the Collection — Dignity Art Edge</title>
  <meta name="description" content="Browse hand-made paintings, sculpture, ceramics, textile art and prints.">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <link rel="stylesheet" href="../assets/css/shop.css">
</head>
<body>

  <div id="dae-navbar"></div>

  <section class="page-banner">
    <div class="container">
      <div class="breadcrumb-mono mb-2"><a href="../index.html">Home</a> / <span class="text-white">Shop</span></div>
      <h1>Shop the Collection</h1>
      <p class="mb-0" style="color:#cfc7b6;">Every catalog entry sold direct from the artisan's studio.</p>
    </div>
  </section>

  <section class="container py-5">
    <div class="row g-4">

      <!-- ============================= FILTER SIDEBAR ============================= -->
      <aside class="col-lg-3">
        <button class="btn btn-dae btn-dae-outline w-100 d-lg-none mb-3" type="button" data-bs-toggle="offcanvas" data-bs-target="#shopFilters">
          <i class="bi bi-sliders"></i> Filters
        </button>

        <div class="offcanvas-lg offcanvas-start" id="shopFilters">
          <div class="offcanvas-header d-lg-none">
            <h5>Filters</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
          </div>
          <div class="offcanvas-body d-block">
            <div class="filter-card surface p-3 mb-3">
              <h6 class="label-mono mb-3">Search</h6>
              <input type="search" id="shop-search" class="form-control form-control-sm" placeholder="Search the catalog…">
            </div>

            <div class="filter-card surface p-3 mb-3">
              <h6 class="label-mono mb-3">Category</h6>
              <div id="shop-category-filters"><!-- injected --></div>
            </div>

            <div class="filter-card surface p-3 mb-3">
              <h6 class="label-mono mb-3">Price Range</h6>
              <input type="range" class="form-range" id="shop-price-range" min="0" max="60000" step="500" value="60000">
              <div class="d-flex justify-content-between label-mono">
                <span>₹0</span>
                <span id="shop-price-value">₹60,000</span>
              </div>
            </div>

            <div class="filter-card surface p-3 mb-3">
              <h6 class="label-mono mb-3">Minimum Rating</h6>
              <div id="shop-rating-filters" class="d-flex flex-column gap-2"><!-- injected --></div>
            </div>

            <button class="btn btn-dae btn-dae-ghost w-100" id="shop-reset-filters">Reset Filters</button>
          </div>
        </div>
      </aside>

      <!-- ============================= RESULTS ============================= -->
      <div class="col-lg-9">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4">
          <span class="label-mono" id="shop-result-count">Loading…</span>
          <select id="shop-sort" class="form-select form-select-sm" style="width:auto;">
            <option value="featured">Sort: Featured</option>
            <option value="price-asc">Price: Low to High</option>
            <option value="price-desc">Price: High to Low</option>
            <option value="rating">Highest Rated</option>
            <option value="newest">Newest First</option>
          </select>
        </div>

        <div class="row g-4" id="shop-product-grid"><!-- injected by shop.js --></div>

        <div class="empty-state d-none" id="shop-empty-state">
          <i class="bi bi-search"></i>
          <h4 class="mt-3">No pieces match those filters</h4>
          <p class="text-muted">Try widening your price range or clearing a category.</p>
        </div>

        <nav class="mt-5" aria-label="Shop pagination">
          <ul class="pagination justify-content-center" id="shop-pagination"><!-- injected --></ul>
        </nav>
      </div>
    </div>
  </section>

  <div id="dae-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    window.DAE_BASE = "../";
    window.DAE_PAGE = "shop";
  </script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/product-card.js"></script>
  <script src="../assets/js/cart.js"></script>
  <script src="../assets/js/wishlist.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/components.js"></script>
  <script src="../assets/js/main.js"></script>
  <script src="../assets/js/shop.js"></script>
</body>
</html>
