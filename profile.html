<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile — Dignity Art Edge</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <link rel="stylesheet" href="../assets/css/account.css">
</head>
<body>

  <div id="dae-navbar"></div>

  <section class="page-banner">
    <div class="container">
      <div class="breadcrumb-mono mb-2"><a href="../index.html">Home</a> / <span class="text-white">My Profile</span></div>
      <h1>My Profile</h1>
    </div>
  </section>

  <section class="container py-5">
    <div class="row g-4">
      <div class="col-lg-3">
        <div class="surface p-3 account-sidebar">
          <div class="d-flex align-items-center gap-3 px-2 py-3 border-bottom mb-2">
            <div class="account-avatar"><i class="bi bi-person"></i></div>
            <div>
              <strong id="acc-side-name">—</strong>
              <span class="d-block label-mono" id="acc-side-email">—</span>
            </div>
          </div>
          <a href="profile.html" class="account-link active"><i class="bi bi-person"></i> My Profile</a>
          <a href="orders.html" class="account-link"><i class="bi bi-box-seam"></i> My Orders</a>
          <a href="wishlist.html" class="account-link"><i class="bi bi-heart"></i> Wishlist</a>
          <a href="cart.html" class="account-link"><i class="bi bi-bag"></i> My Cart</a>
          <a href="#" class="account-link text-danger" id="profile-logout-btn"><i class="bi bi-box-arrow-right"></i> Logout</a>
        </div>
      </div>

      <div class="col-lg-9">
        <div class="surface p-4 mb-4">
          <h5 class="label-mono mb-4">Personal Details</h5>
          <div id="profile-alert" class="alert d-none"></div>
          <form id="profile-form" class="form-dae row g-3">
            <div class="col-md-6">
              <label for="pf-name">Full Name</label>
              <input type="text" class="form-control" id="pf-name" required>
            </div>
            <div class="col-md-6">
              <label for="pf-email">Email Address</label>
              <input type="email" class="form-control" id="pf-email" disabled>
            </div>
            <div class="col-md-6">
              <label for="pf-phone">Phone Number</label>
              <input type="tel" class="form-control" id="pf-phone" pattern="[0-9]{10}">
            </div>
            <div class="col-md-6">
              <label for="pf-pincode">Pincode</label>
              <input type="text" class="form-control" id="pf-pincode" pattern="[0-9]{6}">
            </div>
            <div class="col-md-8">
              <label for="pf-address">Address</label>
              <input type="text" class="form-control" id="pf-address">
            </div>
            <div class="col-md-4">
              <label for="pf-city">City</label>
              <input type="text" class="form-control" id="pf-city">
            </div>
            <div class="col-12">
              <button type="submit" class="btn btn-dae btn-dae-primary mt-2">Save Changes</button>
            </div>
          </form>
        </div>

        <div class="surface p-4">
          <h5 class="label-mono mb-4">Change Password</h5>
          <div id="password-alert" class="alert d-none"></div>
          <form id="password-form" class="form-dae row g-3">
            <div class="col-md-4">
              <label for="pw-current">Current Password</label>
              <input type="password" class="form-control" id="pw-current" required>
            </div>
            <div class="col-md-4">
              <label for="pw-new">New Password</label>
              <input type="password" class="form-control" id="pw-new" required minlength="6">
            </div>
            <div class="col-md-4">
              <label for="pw-confirm">Confirm New Password</label>
              <input type="password" class="form-control" id="pw-confirm" required minlength="6">
            </div>
            <div class="col-12">
              <button type="submit" class="btn btn-dae btn-dae-outline mt-2">Update Password</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </section>

  <div id="dae-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    window.DAE_BASE = "../";
    window.DAE_PAGE = "profile";
  </script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/product-card.js"></script>
  <script src="../assets/js/cart.js"></script>
  <script src="../assets/js/wishlist.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/components.js"></script>
  <script src="../assets/js/main.js"></script>
  <script src="../assets/js/profile.js"></script>
</body>
</html>
