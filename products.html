<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products — Dignity Art Edge Admin</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>

  <!-- Add / Edit product modal (shared by the "Add Product" button and each row's edit action) -->
  <div class="modal fade" id="productModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <form id="product-form" class="form-dae">
          <div class="modal-header">
            <h5 class="modal-title" id="productModalTitle">Add Product</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="pm-edit-id">
            <div class="row g-3">
              <div class="col-md-6">
                <label for="pm-name">Product Name</label>
                <input type="text" class="form-control" id="pm-name" required>
              </div>
              <div class="col-md-6">
                <label for="pm-category">Category</label>
                <select class="form-select" id="pm-category" required></select>
              </div>
              <div class="col-md-4">
                <label for="pm-price">Price (₹)</label>
                <input type="number" class="form-control" id="pm-price" min="0" required>
              </div>
              <div class="col-md-4">
                <label for="pm-stock">Stock Quantity</label>
                <input type="number" class="form-control" id="pm-stock" min="0" required>
              </div>
              <div class="col-md-4">
                <label for="pm-badge">Badge</label>
                <select class="form-select" id="pm-badge">
                  <option value="">None</option>
                  <option value="new">New Arrival</option>
                  <option value="bestseller">Bestseller</option>
                  <option value="limited">Limited Edition</option>
                </select>
              </div>
              <div class="col-md-6">
                <label for="pm-medium">Medium</label>
                <input type="text" class="form-control" id="pm-medium" placeholder="e.g. Oil on canvas" required>
              </div>
              <div class="col-md-6">
                <label for="pm-origin">Origin</label>
                <input type="text" class="form-control" id="pm-origin" placeholder="e.g. Jaipur, IN" required>
              </div>
              <div class="col-12">
                <label for="pm-desc">Description</label>
                <textarea class="form-control" id="pm-desc" rows="3" required></textarea>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-dae btn-dae-ghost" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-dae btn-dae-primary">Save Product</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/admin/admin-common.js"></script>
  <script>
    if (daeAdminRequireAuth()) {
      daeRenderAdminShell("products", "Products");
    }
  </script>
  <script src="../assets/js/admin/products.js"></script>
</body>
</html>
